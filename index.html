<!DOCTYPE html>
<html>
<head>
  <title>HAU Helps</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    header {
      background: linear-gradient(to right, #2E7D32, #1B5E20);
      color: white;
      padding: 100px 20px;
      text-align: center;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    section {
      padding: 60px 20px;
      text-align: center;
      max-width: 1000px;
      margin: auto;
    }

    .button {
      display: inline-block;
      padding: 14px 28px;
      background: #2E7D32;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.3s;
    }

    .button:hover {
      transform: scale(1.05);
    }

    .card-container {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      padding: 20px;
      width: 250px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
    }
  </style>
</head>

<body>

<header>
  <h1>HAU Helps</h1>
  <p>Advocating for the unhoused in every community.</p>
  <br>
  <a href="#" class="button">Start a Branch</a>
</header>

<section>
  <h2>What We Do</h2>
  <div class="card-container">
    <div class="card">
      <h3>Advocacy</h3>
      <p>Raise awareness and fight for policy change.</p>
    </div>
    <div class="card">
      <h3>Community Drives</h3>
      <p>Organize donation events to support shelters.</p>
    </div>
    <div class="card">
      <h3>Leadership</h3>
      <p>Empower students to lead locally.</p>
    </div>
  </div>
</section>

</body>
</html>
